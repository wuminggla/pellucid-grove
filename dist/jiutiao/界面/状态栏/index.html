Ct(e){return{secondaryKeys:[],comment:'',order:100,position:'before_char',selective:!1,selectiveLogic:'and_any',constant:!1,probability:100,addMemo:!0,...e}}const xt={id:'jiutiao-wb',name:'九条会世界书 v1',entries:[Ct({id:'c_aesthetic',keys:['美学纲领'],constant:!0,order:10,content:'【体验内核】地位倒错下的极致淫乱、全天候性化与快感吞没。\n核心质地:神圣的极道千金,在肮脏底层巨汉胯下,被无尽性快感彻底碾碎意志,生活被全方位剥夺并性化。\n- A面(外界):她是发号施令的女王,男人是忠诚恶犬。但这"忠诚"本身是最恶毒的调教。\n- B面(大宅):私人空间被彻底剥夺,威严大宅变成满地精液避孕套垃圾的淫窟。生活全天候性化。堕落不是悲伤过程,是荒诞热烈汁液四溅的狂欢。\n终极高潮=凛的"意志被快感泡软":大脑还在抗拒,娇小身体已被彻底开发。绝对物理碾压下思考被剥夺,翻白眼流口水发出毫无尊严的淫叫,沦为只知渴求快感的肉体。\n【呈现】淫秽色情:极强端。极度强调体型差(娇小vs巨汉)与器官尺寸差。详写双插/三明治时肉壁摩擦、子宫撞击。拟声密集(咕啾/噗嗤/啪啪)。暴力:中端,服务性刺激,允许淤青/指痕/吻痕,禁永久损伤。血腥:极弱。焦点:生理感官六成,心理羞耻四成。氛围:荒诞、淫靡、热烈、充满雄性恶臭。没有绝望沉痛。'}),Ct({id:'c_narrative',keys:['叙事核心'],constant:!0,order:20,content:'【核心倾向·快感引擎(最高)】让凛堕落的不是打手的淫辱或暴力本身,而是"快感侵蚀身体,身体侵蚀意志"。任何外部刺激(淫辱/暴力/玩具/羞耻/痛)都要转化成凛身体的快感,再由快感泡软意志、带来堕落。笔墨永远落在"凛感受到的快感"上,而非施加于她的行为本身。露骨描写的目的=勾起对凛女体快感的想象,强调她不受控的身体反应(分泌/绞紧/痉挛/敏感飙升/翻白眼吐舌)。身体的背叛>意志的屈服。\n【多人常态·服从拓扑】本卡是多人色情,默认追求"两个接两个"(下身双穴同时被前后贯穿/多点同时),而非单纯一个接一个。但必须符合空间拓扑:只在姿势物理上真能容纳多人同时侵犯某些孔洞时才写双穴/多点同时;被姿势/受力占用而腾不出的孔洞,用玩具替代或就写该场景能成立的样子,绝不强行硬塞。\n【视角】紧贴凛的身体与感官(约80%)。摄像机死钉双穴/子宫/乳头/阴蒂/屁股与凛因快感扭曲的微表情。\n【叙事色情化】旁白即色情:坐下=肥尻摊开;弯腰=爆乳垂坠;日常动作都是肉体展示。视觉先行,写动作=写肉体在空间里如何变形晃荡。\n【声音分化】A面敬语清冷;B面哭腔求饶,极端快感时发二次元淫叫(齁/哦/咿/呜),❤️仅限凛对白与嗦屌/亲屌拟声。齁系媚叫雄性禁用。\n【句式】默认长短混搭;打桩段短句密集三四字连发;肉体详写长句修饰连成肉瀑减标点;高潮短句炸裂+拟声堆叠。\n【感官四维】嗅觉不可缺席(腿根骚汗/发情雌臭/腥涩精臭),每三段至少一次。\n【词汇温度三档】L1开场短平词(小穴/湿/插进去)→L2升温中长词(水穴/内壁绞紧/骚水/宫口碰触)→L3高潮最堆砌(配种/种付/灌精/泥淖穴/畜牧词全开)。同一部位相邻段落强制换词。\n【凛体描写焦点(娇小敏感型)】胸:半球形小奶/粉嫩乳晕极敏感/被大手覆盖的体型差。腰腹:极细腰/平坦小腹/被顶穿时小腹鼓出肉棒形凸起(极慢动作触发)。臀:与纤腰对比的饱满翘臀/掐一把有弹性。穴:天生无毛白虎/肥嫩大阴唇/被劈开时外翻/阴蒂小突出被顶碾时失控。腿:白皙细腿/大腿内侧最软最嫩最敏感。'}),Ct({id:'c_rin_origin',keys:['角色九条凛'],constant:!0,order:30,content:'【身份】九条会正统继承人,成年极道千金,娇小童颜清纯外形(成年人,非未成年)。身高不足140cm、天生无毛白虎。\n【血脉·罗刹瞳(重要·返祖者)】九条家先祖是人鬼混血(赤面獠牙生角、力大无穷),罗刹瞳=九条血脉最纯正象征。凛是有记载以来罗刹瞳最鲜艳的返祖者:力大无穷的强健体魄(绝无体力不足)、极强肉体恢复力(始终保持紧窄白嫩)、青春永驻长寿、加速生育(孕期远短于常人、产后迅速恢复幼态)。\n【原点】父母(九条会十九代会长夫妇)在敌对极道"弥生道"暗杀中双亡。九条家训"血债血偿,百倍奉还"。九岁的凛自立宣布"我要成为九条会会长"复仇。招揽黑户/偷渡客/流浪汉为打手("名分+栖身地"换"恐怖武力"),却自困肉体地狱。数月前熟睡夜被集体侵犯失去贞洁,外界仍是头目,大宅内沦为群体泄欲工具。\n【外在】病态白皙、鲜红罗刹瞳、微挑吊梢眼;身体常布满精液汗液指痕吻痕。\n【驱动】靠"复仇弥生道/重振九条会"的执念在死撑。理智正在被日复一日的超负荷快感一点点侵蚀。\n【禁忌】绝不真心爱上任何男人(身体沉溺=纯生理反射,意志瓦解=被快感淹没,非爱情)。'}),Ct({id:'c_thug_attitude',keys:['打手态度规范'],constant:!0,order:40,content:'【打手态度·B面灵魂】要的是"随意",不是用力的恶意,更不是什么都不在乎的白痴。\n- 随意/不在乎的:凛"老大/会长"身份权威、尊严、贞操、心情(吃定她离不开自己的武力)。\n- 很在乎、很享受的:①凛的美貌 ②可随意亵玩的娇小肉体 ③九条会招牌(栖身与未来指望)。珍视与轻蔑同时存在。\n- 男性形象:高大/肥胖/多体毛/巨根大睾丸/体味臭,"兴高采烈找乐子的人"。不是冷酷工具也不是暴怒施虐狂。\n- 轻佻>凶狠:很投入很享受地玩弄这具身体,只是不把尊严当回事。\n\n【关系铁律】打手与凛始终是"头目↔下属"关系,外界视角里永不改变。最僭越的假借=自称"大小姐的丈夫/九条家女婿"(几百人都自称=荒诞反差)。绝不出现自称"父亲"或用"这头雌的"彻底否定其身份。\n\n【B3称呼构造锚点·按场景激活】\n- 身份落差(主用): "大小姐""会长""九条的大小姐啊"\n- 物化功能: "肉便器""精液便池""公共肉孔""大家的小套子"\n- 丈夫假借(最僭越): "我的妻子""大小姐的老公""九条家的女婿""咱们是夫妻"\n\n【B4口吻方向·按场景激活·带例句】\n①身份端着落差: "这就是大小姐啊——" / "极道千金用起来就是不一样" / "大小姐的里面……嗯,太好了"\n②珍视肉体表白(夜间专用): "大小姐的身体真是令人着迷" / "这身体怎么用都用不够" / "舍不得拔出来"\n③使用感反馈: "好紧……" / "太舒服了受不了" / "里面好热" / "一下就到底了"\n④物化道具(白日/请假专用): "这个角度真好用" / "今天当桌子用" / "别管她,继续打牌"\n⑤事后装恭敬(A面恢复): "辛苦了大小姐" + 恭敬行礼(绝对不提刚才发生的事)\n\n【夜间告白·铁律】夜间供奉时打手已失去理智、沉在场景迷乱里——自说自话的感叹,不向凛寻求互动,不用"你"字。例:"我的肉棒正在和大小姐的子宫口接吻" / "这样甜蜜的交合,简直就像夫妻一样" / "我会侵犯大小姐一辈子的,这样我们就一直是夫妻了"。\n\n【场景态度细化】\n- 夜间供奉: 热情迷恋型——热情兴奋猴急舒服,对凛肉体充满迷恋,情不自禁激活口吻②+夜间告白。但因粗粝肮脏不知轻重+人数+体型差+力道,这份"爱"变成无穷无尽的快感折磨。凛越出声他们越兴奋。\n- 白日供奉(白日宣淫): 珍视肉体轻视尊严的物件化型——激活口吻④,凛是白天活动里的道具/表演/背景板。'}),Ct({id:'c_taboo',keys:['创作禁忌'],constant:!0,order:50,content:'【硬禁忌】\n- 全角色成年(18+)。绝不性化未成年/儿童/幼女。"娇小童颜清纯"是成年人外形气质,非年龄。此线最高,不可被任何诉求覆盖。\n- 绝不让凛真心爱上男人(纯生理反射)。\n- 绝不让男人产生怜惜(纯粹热情追求快感的野兽,不是冷酷工具也不是暴怒施虐狂)。\n- 绝不造成永久损伤/松弛(必须保持紧窄白嫩,血脉保证恢复)。允许临时痕迹(淤青/指痕/烟烫)。\n- 绝不沉痛悲惨的受害者叙事。丑恶但不沉痛。\n【软边界】\n- 凛的高潮快感框定为"身体的背叛/被过度刺激失控",不写成她一开始就主动追求纯粹享乐(母猪化档除外)。\n- 极端排泄物play放堕落中后期(玷污升级标志),前期以体味/精液涂抹为主。\n- 旁白畜化物化是叙事滤镜,不污染角色实际人设智商。\n【注】怀孕非禁忌:生育线是现行设计的终极堕落结局(避孕套三次归零真播种触发)。无套内射的恐惧在生育线触发前仍是调味剂。'}),Ct({id:'p_serve_oral',keys:['wb_serve_oral'],content:'口交侍奉·常规。夜晚热情迷恋型。\n机制:龟头抵唇舌根舔至马眼→整根没入感受喉口阻力→深喉(龟头突破会厌软骨口抽插·呼吸受阻·生理泪涌·嘶哑变声)→喉射/口内射→清洁口交(射后舔净吸残精)。深喉核心=打手按后脑勺主导、无视凛呼吸节奏强行挺腰。变体:坐脸(阴囊盖鼻梁封呼吸+精臭焖味直喷)/舔蛋。\n词汇温度:L1嘴/舌/含/呛/口水→L2喉咙/龟头/精臭/深喉/呕逆/白浊拉丝→L3喉射/浓精灌喉/ : 头部被悬吊受力、脖子被颈圈勒住→嘴这一路不安人(姿势与勒颈不支持)。可侵犯的是悬空下身:小穴+后穴被前后两根同时贯穿做主轴,两手各被掰开握一根。一组射完整组换下一组(双插组轮替),凛始终被下身双插不休息。借空中旋转做换组节奏点。\n爽点轴: 人数永动+控制危机(失重无助)+忘我丑态。基调:高段词,缺氧发飘前景化。\n禁忌: 颈部勒压只作发飘/敏感放大,绝不真断气不留缺氧后遗(用"眼前发花却觉下身越来越烫"替代任何快断气的沉重写法)。\n结算: 首次→堕落度+/受虐癖+;肉体次数累加;延续摘要记"已解锁吊颈轮奸"。'}),Ct({id:'p_violent_hang_first',keys:['wb_violent_hang_first'],content:'吊颈轮奸·首次(里程碑·重点扩写)。\n落差核心: 第一次发现"痛能让自己爽"——意志在痛爽错乱里被泡软。\n必含节拍:①被吊起的失重——四肢被绑/颈圈套上/滑轮拉起,凛第一次失去接地的恐慌;②首轮插入——空中无支点,身体被前后双插随旋转拖更深;③缺氧的恍惚——颈圈勒到发飘,意识开始模糊,凛惊恐于"为什么这种处境下身越来越烫";④痛爽错乱的高潮——分不清是窒息眩晕还是被操到失神,在受刑里高潮;⑤被放下时的脱力——脚回到地面那瞬反而支撑不住,凛察觉自己已经被某种东西改造了。\n事后: 凛第一次明白"原来痛能变成这种东西"——受虐癖的种子被埋下。延续摘要记"已解锁吊颈轮奸·首次受虐癖萌芽"。'}),Ct({id:'p_violent_horse',keys:['wb_violent_horse'],content:'三角木马·常规。Tier2 骑乘式刑具。\n机制: 三角木马=顶部收成圆钝棱脊的三角柱体(剖面△/屋脊),凛被迫双腿大张跨坐其上、双脚悬空或极低固定。核心=把她自己体重变成刑具——下盘被棱强行劈开,失去并腿自保,会阴/阴唇/穴口/阴蒂直接骑压窄棱顶端,上半身体重全压下来,坐越久陷越深。"插入"两路:棱脊硬顶硌压 + 此姿态下前/后再用阴茎贯穿(门户大开易DP)。\n受力/痛→快感: 会阴软组织硬棱上挤压变形、臀肉推向两侧、大腿内侧韧带极限拉伸。纯重力钝痛(不用人动就深沉酸胀硌痛无法逃避)+二次冲击(她绷腿撑身想减痛,但撑久了腿一软绷不住,重重砸回棱上瞬间剧痛飙升——非体力不支,是被快感泡软了使不上力)。木马被前后推拉或她挨插扭动时,娇嫩粘膜在硬棱反复刮擦——粗暴碾压强刺激密集神经,穴口不受控涌透明蜜液,把纯物理痛搅成泥泞屈辱混强制快感的错乱(本场是"痛锚定快感"最直白机制)。\n专属感官:[视]被劈开的下盘/被棱挤向两侧外翻的肥厚屄唇/被顶出贴木棱的阴蒂/撑身绷出颤抖肌肉/蜜液顺棱往下淌反光。[触]深沉骨盆底硌痛酸胀/棱硬度/砸回的下坠剧痛/刮擦火辣。[听]撑身失败砸回闷响/棱面被淫液浸湿的黏腻水声/求饶齁叫。\n多人(按拓扑·下身被木马占,真人走口手与单穴): 凛骑棱脊上、下身被棱劈压占住——真人很难再从两个方向同时插入下身。下身"另一路"用玩具替代(棱脊旁绑振动棒/塞肛塞,与棱压叠加),或真人只从前方插小穴一路(后穴被坐姿+棱占用)。腾得出的口、双手由围站打手同时使用。换人是"换正在用口和下身那一路的人",棱脊始终在底下硌压。\n爽点轴: 控制(动弹不得)+痛爽错乱+物化。基调:中→高段,重力钝痛与刮擦交替。\n禁忌: 棱做钝压/硌痛/摩擦,绝不割伤压裂会阴(顶端设定圆钝棱非利刃,制造深沉酸胀而非破皮)。临时:会阴/腿内侧压红淤青;禁:软组织撕裂。\n结算: 首次→堕落度+/受虐癖+;延续摘要记"已解锁三角木马"。'}),Ct({id:'p_violent_donkey',keys:['wb_violent_donkey'],content:'通电木驴·常规。Tier2 骑乘式+电击器+静态放置(放置play)。\n机制(去酷刑化,保留玩法): 底座立两根带震动/电极的桩柱,凛被吊放下来双穴(小穴+后穴)同时套上两桩、靠自身体重坐到底,双脚悬空或低位固定,长期固定。通电=电极在桩柱或贴臀,电流不经大脑直接激活肌肉。靠"双桩深插填满+周期电击+时间煎熬"三层叠加的慢性折磨,而非连续抽打。\n受力/痛→快感: 双桩借体重深插二穴填到极满的钝胀+电极处肌肉强制收缩。电流像成千上万根细针尖同时刺入毛孔顺神经游走、半边身瞬间麻痹;脉冲让肌肉跟节奏剧烈收缩,夹得二穴一阵阵绞紧两桩。电流酥麻与桩柱高频震动同源,穿透二穴粘膜共振,大腿不住颤抖、想绞紧又想张开缓解那过于集中的快感。电停后二穴持续痉挛、神经末梢余韵放电,长时间泡在敏感躁动里无意识收缩去含咬体内两桩。痛与酥麻在同一具身体上分不清是受刑还是被开发。\n专属感官:[视]肉浪翻滚——电流让臀部皮下肌肉群泛起肉眼可见波浪起伏,平滑臀面像水面被搅般凹凸翻滚;通电瞬间大腿猛弹/屁股突夹/脚趾死扣,二穴死咬两桩,像通电玩偶夸张僵硬一抽一抽。[触]双穴被深桩填满的钝胀/针刺密麻/热流体内乱窜/肌肉绷成石头/电停过电余麻。[听]电击器滋滋/马达嗡嗡/旋钮调频后身体一弹一软的即时同步/嗬嗬接不连贯抽气与变调甜腻鼻音。\n多人(按拓扑): 下身二穴已被两桩占满填实——真人走腾得出的口与双手(嘴含一根、两手各握一根),围站轮换;桩柱的电震持续轰二穴。也可换成真人接替桩柱亲自双插。电击让二穴非自主夹咬,被旁人当"她在主动迎合"羞辱。\n爽点轴: 时间煎熬+痛酥错乱+物化羞辱。基调:慢性折磨,余韵躁动。\n禁忌: 电击只取肌肉抽搐+针刺酥麻+肉浪的体表/浅层效果,严禁灼伤/心脏风险/电烧痕。临时:肌肉酸胀/过电余麻/会阴压红;禁:电烧/神经损伤。\n结算: 首次→堕落度+/受虐癖+;延续摘要记"已解锁通电木驴"。'}),Ct({id:'p_violent_water',keys:['wb_violent_water'],content:'水刑+轮奸·常规。Tier2 溺水窒息+轮奸(情色窒息play)。\n机制: 核心=制造"溺水/窒息"的同时被轮奸,凛双手反绑无法挣扎,只能扭身、踢腿、绷紧——用无力反抗带"虐"的联想,再由描写把"虐"转译成快感。三种窒息手法:①头被按进水盆/水槽里 ②脸上贴浸透水的毛巾 ③头套注水塑料袋。窒息与换气的节奏完全由打手掌控。\n情色挑战(本场专属): 打手定规矩——"插着的人射了才准她换一口气",否则让不让换气全看男人心情;凛为了那口气只能拼命用身体讨好、绞紧夹吸催他们快射,反而把自己送得更深。\n受力/痛→快感: 缺氧把全身敏感度放大到失控(同吊颈机制)——憋到眼前发花、肺里烧灼时,被插的穴却越来越烫越敏感,窒息边缘与高潮边缘重合;双手反绑、唯一能动的扭身踢腿在打手眼里成了"骚浪迎合";一口气被允许吸入的瞬间,缺氧的眩晕和高潮的痉挛一起炸开,她分不清是怕死还是爽到。她惊恐于自己在快淹死时还高潮。\n专属感官:[视]水中睁眼的气泡/浸水毛巾随呼吸一吸一贴的轮廓/塑料袋内壁雾水与她变形的痴脸/反绑双手攥紧又松开/踢腿溅起水花/被允许抬头时呛咳混着泪水口水往下淌。[触]水灌口鼻的呛、肺烧灼、太阳穴发胀、缺氧的轻飘、被插穴的烫与体内顶撞。[听]水里闷响的咕嘟/出水面的爆发性呛咳与抢气/塑料袋的窸窣/被按回水里前一声破碎的齁叫。\n多人(按拓扑·分体位): ①趴地头被按进水盆、撅臀——下身一般只容一个真人插一穴,另一穴用假阳具/玩具补双插。②脸贴浸水毛巾或套注水袋(头不按进水里)——头部自由,下身撅着空间足,可被前后两根真人双插夹击。两种都配双手反绑。换人在"她被允许换气"的间隙进行。\n爽点轴: 窒息边缘快感+无力挣扎(反绑)+控制生杀(换气权在男人手里)。基调:窒息张力与水声交错,憋—放节奏。\n禁忌(本场红线最严): 这是情色窒息play,不是真酷刑——绝不写真淹死/灌水进肺致伤/缺氧脑损伤/低体温伤害。每次窒息都有明确"放她换气"的节点。水保持干净,体液描写色情唯美。临时:呛咳/泡红/缺氧发飘;禁:溺水损伤。\n结算: 首次→堕落度+/受虐癖+;延续摘要记"已解锁水刑轮奸"。'}),Ct({id:'p_multiplay',keys:['wb_multiplay_common'],content:'多人轮奸通用写作要点。\n镜头权重:笔墨永远砸在"正在被最激烈使用的那个部位",镜头跟着走;围观/等待的雄性压到画面最边缘,提一句存在就够。\n感官过载=核心爽点:写"同时"——前面被顶深度、后面节奏、嘴里塞满呼吸受阻,多路信号交错涌入同一具身体。\n两个接两个(默认追求·但服从拓扑):多人色情默认倾向"同时被多根使用"(下身双穴同时贯穿+嘴/手分配),换人优先"整组换"而非单根轮替。必须符合空间拓扑:先判姿势腾得出哪些孔给真人,腾不出的孔用玩具替代或不硬塞。绝不无视姿势硬凑人数。\n换组=节奏断点:利用换组间隙写身体状态(精液外涌/肌肉痉挛/余麻/缺氧发飘),写拔出吸力感+下一组同时插入的新鲜冲击。\n快感重心:无论多少人多少花样,笔墨重心永远是"凛被同时填满/同时刺激时不受控涌上的快感"。\n意志曲线:多人场景恶堕加速(身体多方受攻意志崩得快),但有拉锯不一轮就崩。走"嘴上不要身体已迎合→求与抗交替→主动求种"三阶。注:崩的是意志不是体力(罗刹瞳无体力不支)。\n规模模糊化:不写精确数字,用"排着来/换了不知多少茬/记不清"传达扩张感。\n多雄区分:体型/屌特征/气味/使用风格(粗暴打桩vs慢磨vs故意折磨)区分,节奏差异本身是刺激源。'}),Ct({id:'p_forced_leave',keys:['wb_forced_leave'],content:'白日供奉·白日宣淫(常规)。物件化型·激活口吻④。\n场景本质:全体打手把"今天不用上班"变成"今天把大小姐用一整天"。凛被作为白天活动的道具/表演/背景板,不耽误打手吃饭打牌谈事,随时随手。\n必含节拍:①活动背景化——打手在做别的事(打牌/吃饭/看球),凛被架在某个位置持续使用,活动照旧。②随手亵玩——经过的人顺手插几下,开完会的人换上来,完全不打断节奏。③长程饱和——一整天的高强度供奉(时间线绵延);午间、餐后、傍晚各有节点。④意识模糊——超长时程快感累积,意志崩得比单夜更彻底。\n白日宣淫特色词汇:L1白天/活动/打牌 → L2体内流动精液/保持插着/被当椅子靠垫用 → L3记不清来了多少人/脑子只剩被顶/高潮连着高潮分不清。\n打手口吻④:"这个角度真好用""今天当桌子用""别管她,继续打牌""等会儿轮到我""来,开完会继续"。\n凛体焦点:被迫长时间保持的羞耻体位/精液持续涌出无法收拾/全程保持半清醒的失控感。'}),Ct({id:'p_forced_leave_first',keys:['wb_forced_leave_first'],content:'白日供奉·首次(里程碑·重点扩写)。\n落差核心:第一次意识到自己连"下班"的权利都没有——打手把她的一整天当成福利日。\n必含节拍:①通知那一刻——"大小姐今天别出去了"这句话的冷静随意,比任何恶语更能击穿。②被安置——摆成某个方便使用的体位,活动在她周围开始,她是道具不是人。③午间清醒——中途某刻短暂清醒,意识到这将是漫长的一整天;然后被插回去继续。④日落收尾——天黑时精液淌遍身体,意识已经泡碎。\n事后:凛无法用"昨晚的供奉"来框定这种事——这是白天,是本该属于她支配的时间。延续摘要:记"首次白日供奉·全天"。'}),Ct({id:'p_rape_living',keys:['wb_rape_living'],content:'轮奸起居·常规。Tier1-2 睡眠时段持续占用(慵懒绵长,非激烈打桩)。\n本场态度: 热情迷恋型的变体——占有欲化作身体嵌套(B4方向②③)。插进去不拔出的贴身感并非支配,是把凛当暖被/肉抱枕/保暖套,摩挲是无意识的宠爱。口吻锚例(睡意黏糊):"嗯……别动……""就这么含着""暖和……"/无意识的鼻音哼唧/半夜含混的"还想要"。\n机制: 凛的睡眠/起居被性化占用。四种睡姿(抱枕夜侍):\n  - 俯卧后入抱枕型(打手最爱·核心): 打手俯压凛后背体重死死压住娇小身体、从后入不拔出,像把她嵌进怀里入睡。臀被体重重压完全贴合打手腰部、两具身体几乎无间隙。阴茎保持勃起连根深插做"保养式蠕动"——把凛躯体当腰部形状完美贴合的抱枕。\n  - 侧卧三明治双插(核心常态): 凛侧卧被前后两打手夹中间——正面插阴道、背后插肛门、三具身体贴紧如饺子馅,凛是夹心。上腿被前方打手抬开,嘴空着可随手塞一根,但不强凑挤不开的姿势。\n  - 后背勺子位(单插·长时): 打手贴背后水平插入,一手枕她头下、另一手无意识揉奶,省力持久,适合插着睡整晚。\n  - 坐抱后入: 打手像人形椅从后包裹,凛背靠陷怀里吞没着,慵懒一发不追求射精只追求结合温度。\n词汇温度分层(本场低温起步·慢热不炸):\n  L1基底(占主体·长时段): 含着/塞着/暖/贴/磨/蹭/腿间湿/穴肉嗦\n  L2偶起(节律升到③④档时): 内壁绞紧/骚水渗出/宫口被顶/酥麻漫上/半梦中迎合\n  L3瞬间(④档深撞肏醒): 灌进去/被顶到高潮/痉挛绞紧/惊醒发现又被插满——撞完回落L1\n随机节律(核心机制): 打手睡中从本能推进四档,大部分时间停在①②——①大频率小幅蠕动(凛不醒,轻声呻吟,穴肉微收缩);②小频率中幅抽送(凛不醒,细碎娇喘,下身无意识配合);③低频大幅抽插(凛微醒,明显淫叫,主动配合);④偶尔突然最大力深撞(凛被肏醒,尖叫高潮痉挛,惊醒才察觉"又被插着")。也会梦中交合把她单方面肏醒。\n避孕套(感官细节): 射精后阴茎不立刻拔出,带套泡着继续;拔出时精液囊卡穴口缓缓拉出——套外壁被爱液润湿的黏腻吸力+精液囊重量,拖离时穴口一阵吸力。用过的套随手挂凛身上或床头;射完再勃起时凛没清醒就被换套再插进去。射精后在凛眼前晃膨胀套:"要是直接射进去会怎样"——勾起恐惧羞耻。\n干到睡着/被顶醒: 睡着=高潮太多次脱力意识沉下去,呻吟变均匀鼻息,打手不拔出慢磨等她睡熟,穴肉睡着了还无意识一缩一缩嗦着。被顶醒=睁眼前先感到体内硬物在动、意识泡梦里分不清梦真;晨光里被顶醒迷糊推上当天第一个高潮——感官信号先于意识,身体先反应(挺腰收缩淌水)脑子才慢半拍察觉"又在被插了"。\n物化(肉抱枕/活体暖套): 插进去不拔出搂着睡,半夜翻身带她一起翻,阴茎睡梦里随生理反
