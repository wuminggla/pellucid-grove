name: Deploy to gh-pages

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm vitest run src/game

      - name: Build
        # base='./' 让构建产物兼容 jsdelivr + GitHub Pages 两种加载路径
        # VITE_BASE 留环境变量入口(默认走 vite.config 的相对路径)
        run: pnpm build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # gh-pages 分支只放编译产物
          # jsdelivr 拉的就是这个分支: cdn.jsdelivr.net/gh/<user>/pellucid-grove@gh-pages/index.html
